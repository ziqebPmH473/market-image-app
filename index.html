<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Market Image Generator</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="app-title">Market Image Generator</div>
    <div class="app-subtitle">NotebookLMのTSVを貼り付け → 1080×1080 PNGを書き出し</div>
  </header>

  <main class="app-main">
    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">入力（TSV＋[SECTION]）</div>
        <div class="panel-actions">
          <button id="btnClear" class="btn">クリア</button>
          <button id="btnPaste" class="btn">貼付</button>
          <button id="btnRender" class="btn">プレビュー更新</button>
          <button id="btnDownload" class="btn primary">PNG保存</button>
        </div>
      </div>
      <textarea id="input" spellcheck="false"></textarea>

      <details class="format">
        <summary>推奨フォーマット（NotebookLM出力用）</summary>
        <pre id="formatSample"></pre>
      </details>

      <div id="status" class="status"></div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">プレビュー</div>
        <div class="panel-actions">
          <label class="toggle">
            <input id="hiresPreview" type="checkbox" />
            <span>高解像度プレビュー（重い）</span>
          </label>
        </div>
      </div>
      <div class="preview-wrap">
        <canvas id="canvas" width="1080" height="1080"></canvas>
      </div>
      <div class="hint">
        ※スマホで保存できない場合は「PNG保存」→表示された画像を長押し保存、または共有メニューを利用してください。
      </div>
    </section>
  </main>

  <script src="app.js"></script>

</body>
</html>
